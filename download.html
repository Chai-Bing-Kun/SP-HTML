        /* 原网站所有样式保留 */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;

        }
        .background-container {
            background-image: url('https://bing.biturl.top/?resolution=1920&format=image');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            min-height: 100%;
            display: flex;
            flex-direction: column;
        }
        header, footer {

            padding: 20px;
            border-radius: 10px;
        }
        main {

            margin: 20px;
            padding: 20px;
            border-radius: 10px;
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header-left {
            display: flex;
            align-items: center;
        }
        .logo {
            width: 50px;
            height: auto;
            margin-right: 15px;
        }
        nav ul {
            list-style-type: none;
            padding: 0;
        }
        nav ul li {
            display: inline;
            margin-right: 20px;
        }
        nav ul li a {
            text-decoration: none;
            color: #333;
        }
        footer {
            text-align: center;
        }
        .product-showcase {
            background-color: rgba(255, 255, 255, 0.5);
            border-radius: 10px;
            padding: 20px;
            margin: 20px 0;
            text-align: center;
        }
        .product-image {
            max-width: 100%;
            height: auto;
            border-radius: 5px;
            margin-bottom: 20px;
        }
        .product-description {
            font-size: 18px;
            line-height: 1.6;
            margin-bottom: 20px;
        }
        .download-button {
            display: inline-block;
            background-color: rgba(76, 175, 80, 0.9);
            color: white;
            padding: 15px 25px;
            text-decoration: none;
            font-size: 18px;
            border-radius: 5px;
            transition: background-color 0.3s, transform 0.2s;
            border: none;
            cursor: pointer;
        }
        .download-button:hover {
            background-color: rgba(69, 160, 73, 0.9);
            transform: scale(1.05);
        }
        .download-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }
        .github-link {
            font-size: 14px;
            color: #0366d6;
            text-decoration: none;
        }
        .github-link:hover {
            text-decoration: underline;
        }
        .run-button {
            background: none;
            border: none;
            color: #0366d6;
            font-size: 14px;
            text-decoration: none;
            cursor: pointer;
        }
        .run-button:hover {
            text-decoration: underline;
        }
        dialog {
            padding: 20px;
            border-radius: 10px;
            border: none;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        dialog::backdrop {
            background-color: rgba(0, 0, 0, 0.5);
        }
        dialog button {
            margin: 5px;
            padding: 10px 15px;
            border: none;
            border-radius: 5px;
            background-color: #4CAF50;
            color: white;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        dialog button:hover {
            background-color: #45a049;
        }
        #feedbackBtn {
            background-color: #4CAF50;
            color: white;
            border: none;
            padding: 10px 20px;
            text-align: center;
            text-decoration: none;
            display: inline-block;
            font-size: 16px;
            margin: 4px 2px;
            cursor: pointer;
            border-radius: 5px;
        }
        form {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        textarea {
            width: 100%;
            height: 100px;
            resize: vertical;
        }
        #feedbackText {
            width: 100%;
            height: 150px;
            margin-bottom: 10px;
        }
        .section-title {
            color: #000;
            font-size: 28px;
            font-weight: bold;
            padding: 10px 0;
            margin-bottom: 15px;
            border-bottom: 2px solid #4CAF50;

            background-color: rgba(18, 18, 18, 0.5);

        }

        .dark-theme .section-title {

        }

            padding: 10px 20px;
            text-align: center;
            text-decoration: none;

            font-size: 16px;

        }
        #themeToggle:hover {
            background-color: #0056b3;
            transform: scale(1.05);
        }
        #themeToggle:active {
            transform: scale(0.95);
        }

            width: 100%;
            margin: 30px 0;
            flex-wrap: wrap;
        }
        .version-list {
            flex: 1;
            min-width: 280px;
            max-height: 600px;
            overflow-y: auto;
            background: rgba(255,255,255,0.8);
            border-radius: 8px;
            padding: 15px;

        .dark-theme .version-list {

        }
        .version-item {

            border-radius: 5px;
            cursor: pointer;
            margin-bottom: 8px;
            transition: background 0.3s;
        }
        .dark-theme .version-item {
            color: #fff;
        }
        .version-item:hover {
            background: rgba(76,175,80,0.3);
        }
        .version-item.active {

            padding: 20px;
            position: relative;

            border-radius: 5px;
            margin-bottom: 20px;
            font-size: 16px;
            outline: none;

            color: #fff;

        // 4. 初始化版本列表
        const versionList = document.getElementById('versionList');
        const downloadLinkList = document.getElementById('downloadLinkList');
        const drawerSearch = document.getElementById('drawerSearch');
        let currentVersion = '';

        // 生成版本项
        const versions = Object.keys(sparkDownloadData).sort((a, b) => {
            // 版本号从高到低排序
            const aArr = a.split('.').map(Number);
            const bArr = b.split('.').map(Number);
            for (let i = 0; i < 4; i++) {
                if (aArr[i] !== bArr[i]) return bArr[i] - aArr[i];
            }
            return 0;
        });
        versions.forEach(ver => {
            const div = document.createElement('div');
            div.className = 'version-item';
            div.textContent = `Spark ${ver}`;
            div.dataset.version = ver;
            versionList.appendChild(div);
            // 绑定版本点击事件
            div.addEventListener('click', () => {
                // 移除其他激活状态
                document.querySelectorAll('.version-item').forEach(item => item.classList.remove('active'));
                // 添加当前激活状态
                div.classList.add('active');
                currentVersion = ver;
                // 渲染对应下载链接
                renderDownloadLinks(ver);
            });
        });

        // 5. 渲染下载链接
        function renderDownloadLinks(version, searchKey = '') {
            const links = sparkDownloadData[version];
            if (!links) {
                downloadLinkList.innerHTML = '<p class="empty-tip">该版本暂无下载链接</p>';
                return;
            }
            // 过滤链接
            const filteredKeys = Object.keys(links).filter(key => {
                return key.toLowerCase().includes(searchKey.toLowerCase());
            });
            if (filteredKeys.length === 0) {
                downloadLinkList.innerHTML = '<p class="empty-tip">未找到匹配的下载链接</p>';
                return;
            }
            // 生成链接项
            let html = '';
            filteredKeys.forEach(key => {
                const url = links[key];
                // 给快速链接加红色标识
                const fastFlag = key.includes('(快速)') ? '<span class="fast-tag">⚡</span>' : '';
                html += `
                    <div class="link-item">
                        <a href="${url}" target="_blank" rel="noopener noreferrer">${key} ${fastFlag}</a>
                    </div>
                `;
            });
            downloadLinkList.innerHTML = html;
        }

        // 6. 搜索框绑定事件
        drawerSearch.addEventListener('input', (e) => {
            const searchKey = e.target.value.trim();
            if (currentVersion) {
                renderDownloadLinks(currentVersion, searchKey);
            } else {
                downloadLinkList.innerHTML = '<p class="empty-tip">请先选择左侧Spark版本</p>';
            }
        });
    </script>
